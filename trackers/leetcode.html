<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LeetCode Tracker | ProgressOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600;700;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="../js/auth.js"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#FF9933",
        "primary-container": "#FF9933",
        "on-primary-container": "#FFFFFF",
        "surface": "#FFFFFF",
        "background": "#F9FAFB",
        "outline-variant": "#E5E7EB",
        "on-surface": "#1E293B",
        "on-surface-variant": "#64748B",
        "secondary": "#000080",
        "tertiary": "#128807",
        "error": "#EF4444",
      },
      spacing: { "max_width": "1440px", "gutter": "24px" },
    },
  },
}
</script>
<style>
body { background-color: #F9FAFB; color: #1E293B; font-family: 'Inter', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
.glass-card { background: #FFFFFF; border: 1px solid #E5E7EB; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.04); transition: all 0.3s ease; }
</style>
</head>
<body class="bg-background selection:bg-primary/20 selection:text-primary">

<!-- ═══════════════════════ TOP NAV BAR (Simplified for brevity) ═══════════════════════ -->
<header id="topnav" class="fixed top-0 left-0 w-full z-50 bg-white/85 backdrop-blur-xl border-b border-outline-variant shadow-sm">
  <div class="flex justify-between items-center px-gutter h-16 max-w-max_width mx-auto">
    <div class="flex justify-between w-full"><div class="flex items-center gap-8">
      <a href="../index.html" class="text-xl font-bold text-primary tracking-tight font-['Geist']">ProgressOS</a>
      <nav class="hidden lg:flex items-center gap-4">
        <a href="../index.html" class="text-on-surface-variant font-medium text-sm hover:text-primary">Dashboard</a>
        <a href="#" class="text-primary font-medium text-sm border-b-2 border-primary">LeetCode</a>
      </nav>
    </div>
  </div>
</header>

<!-- ═══════════════════════ MAIN CONTENT ═══════════════════════ -->
<main class="pt-24 pb-16 px-gutter max-w-max_width mx-auto">
  <div class="flex justify-between items-end mb-8">
    <div>
      <h1 class="text-3xl font-bold text-on-surface font-['Geist']">LeetCode Tracker</h1>
      <p class="text-on-surface-variant mt-1">Track your problem-solving progress and topics.</p>
    </div>
    <button onclick="openModal()" class="bg-primary text-white px-4 py-2 rounded-lg font-medium hover:bg-[#e68a2e] active:scale-95 transition-all">
      <span class="material-symbols-outlined text-[18px] mr-1">add</span> Log Session
    </button>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">
    <div class="glass-card p-6 rounded-xl text-center border-b-4 border-b-primary">
      <p class="text-xs text-on-surface-variant uppercase font-bold tracking-wider">Rating</p>
      <p id="stat-rating" class="text-3xl font-bold text-primary mt-2">-</p>
    </div>
    <div class="glass-card p-6 rounded-xl text-center">
      <p class="text-xs text-on-surface-variant uppercase font-bold tracking-wider">Total Solved</p>
      <p id="stat-total" class="text-3xl font-bold text-on-surface mt-2">0</p>
    </div>
    <div class="glass-card p-6 rounded-xl text-center border-b-4 border-b-green-500">
      <p class="text-xs text-on-surface-variant uppercase font-bold tracking-wider">Easy</p>
      <p id="stat-easy" class="text-3xl font-bold text-green-600 mt-2">0</p>
    </div>
    <div class="glass-card p-6 rounded-xl text-center border-b-4 border-b-yellow-500">
      <p class="text-xs text-on-surface-variant uppercase font-bold tracking-wider">Medium</p>
      <p id="stat-medium" class="text-3xl font-bold text-yellow-600 mt-2">0</p>
    </div>
    <div class="glass-card p-6 rounded-xl text-center border-b-4 border-b-red-500">
      <p class="text-xs text-on-surface-variant uppercase font-bold tracking-wider">Hard</p>
      <p id="stat-hard" class="text-3xl font-bold text-red-600 mt-2">0</p>
    </div>
  </div>

  <!-- Data Table -->
  <div class="glass-card rounded-xl overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50 border-b border-outline-variant text-xs text-on-surface-variant uppercase tracking-wider">
          <th class="px-6 py-4 font-medium">Date</th>
          <th class="px-6 py-4 font-medium">Contest / Rating</th>
          <th class="px-6 py-4 font-medium">Easy</th>
          <th class="px-6 py-4 font-medium">Medium</th>
          <th class="px-6 py-4 font-medium">Hard</th>
          <th class="px-6 py-4 font-medium">Topics</th>
          <th class="px-6 py-4 font-medium text-right">Actions</th>
        </tr>
      </thead>
      <tbody id="entries-table" class="text-sm divide-y divide-outline-variant">
        <tr><td colspan="7" class="px-6 py-8 text-center text-on-surface-variant">Loading data...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ═══════════════════════ MODAL ═══════════════════════ -->
<div id="modal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant">
      <h3 class="text-lg font-bold text-on-surface font-['Geist']">Log LeetCode Session</h3>
      <button onclick="closeModal()" class="material-symbols-outlined text-on-surface-variant hover:text-on-surface">close</button>
    </div>
    <form id="entry-form" class="p-6 space-y-4">
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Easy</label>
          <input id="in-easy" type="number" min="0" value="0" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
        </div>
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Medium</label>
          <input id="in-medium" type="number" min="0" value="0" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
        </div>
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Hard</label>
          <input id="in-hard" type="number" min="0" value="0" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
        </div>
      </div>
      <div>
        <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Topics (comma separated)</label>
        <input id="in-topics" type="text" placeholder="Arrays, DP, Graphs" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
      </div>
      <div class="border-t border-outline-variant my-4 pt-4">
        <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-3">Optional: Contest Info</p>
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Contest Name</label>
          <input id="in-contestName" type="text" placeholder="e.g. Weekly Contest 400" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-4">
          <div>
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">New Rating</label>
            <input id="in-rating" type="number" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
          </div>
          <div>
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Rank</label>
            <input id="in-rank" type="number" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
          </div>
        </div>
      </div>
      <button type="submit" class="w-full bg-primary text-white py-2.5 rounded-lg font-medium hover:bg-[#e68a2e] transition-all">
        Save Entry
      </button>
    </form>
  </div>
</div>

<script>
const API_URL = 'http://localhost:5000/api/trackers/leetcode';

function openModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('modal').classList.add('flex'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }

async function fetchEntries() {
  try {
    const res = await window.apiFetch(API_URL);
    const data = await res.json();
    if (data.success) {
      // Sort entries by date descending
      data.data.sort((a, b) => new Date(b.date) - new Date(a.date));
      renderTable(data.data);
      updateStats(data.data);
    }
  } catch (err) { console.error('Fetch error:', err); }
}

function renderTable(entries) {
  const tbody = document.getElementById('entries-table');
  if (entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-on-surface-variant">No sessions logged yet.</td></tr>';
    return;
  }
  
  tbody.innerHTML = entries.map(entry => {
    const date = new Date(entry.date).toLocaleDateString();
    const topicsHtml = entry.topics.map(t => `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs mr-1">${t}</span>`).join('');
    const contestHtml = entry.contestName ? `<span class="font-bold text-primary">${entry.rating || '-'}</span> <span class="text-xs text-gray-500">(${entry.contestName})</span>` : '<span class="text-gray-400">Practice</span>';

    return `
      <tr class="hover:bg-gray-50 transition-colors group">
        <td class="px-6 py-4 font-medium text-on-surface">${date}</td>
        <td class="px-6 py-4">${contestHtml}</td>
        <td class="px-6 py-4 text-green-600 font-bold">${entry.easy}</td>
        <td class="px-6 py-4 text-yellow-600 font-bold">${entry.medium}</td>
        <td class="px-6 py-4 text-red-600 font-bold">${entry.hard}</td>
        <td class="px-6 py-4">${topicsHtml}</td>
        <td class="px-6 py-4 text-right">
          <button onclick="deleteEntry('${entry.id}')" class="text-error opacity-0 group-hover:opacity-100 transition-opacity text-xs font-bold hover:underline">Delete</button>
        </td>
      </tr>
    `;
  }).join('');
}

function updateStats(entries) {
  let easy = 0, medium = 0, hard = 0;
  // Find latest rating
  let latestRating = '-';
  for (const e of entries) {
    if (e.rating) {
      latestRating = e.rating;
      break;
    }
  }

  entries.forEach(e => { easy += e.easy; medium += e.medium; hard += e.hard; });
  document.getElementById('stat-rating').textContent = latestRating;
  document.getElementById('stat-total').textContent = easy + medium + hard;
  document.getElementById('stat-easy').textContent = easy;
  document.getElementById('stat-medium').textContent = medium;
  document.getElementById('stat-hard').textContent = hard;
}

document.getElementById('entry-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const easy = parseInt(document.getElementById('in-easy').value) || 0;
  const medium = parseInt(document.getElementById('in-medium').value) || 0;
  const hard = parseInt(document.getElementById('in-hard').value) || 0;
  const topics = document.getElementById('in-topics').value.split(',').map(t => t.trim()).filter(Boolean);
  const contestName = document.getElementById('in-contestName').value || null;
  const rating = parseInt(document.getElementById('in-rating').value) || null;
  const rank = parseInt(document.getElementById('in-rank').value) || null;
  
  const data = { easy, medium, hard, topics, contestName, rating, rank };

  try {
    const res = await window.apiFetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      closeModal();
      document.getElementById('entry-form').reset();
      fetchEntries();
    }
  } catch (err) { console.error('Save error:', err); }
});

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  try {
    await window.apiFetch(`${API_URL}/${id}`, { method: 'DELETE' });
    fetchEntries();
  } catch (err) { console.error('Delete error:', err); }
}

if (window.clerkReady) fetchEntries();
else window.addEventListener('clerk-ready', fetchEntries);
</script>
</body>
</html>
