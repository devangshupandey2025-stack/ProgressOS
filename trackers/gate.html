  <script>
    function toggleSection(btn) {
      btn.parentElement.classList.toggle('open');
      const content = btn.nextElementSibling;
      content.classList.toggle('hidden');
    }

    const SYLLABUS_API = '/api/gate/syllabus';

    function getTopicKey(cb) {
      const section = cb.closest('.syllabus-section').querySelector('button').textContent.trim().split(':')[0].trim();
      const label = cb.closest('label').textContent.trim();
      return section + '|' + label;
    }

    function getSectionName(cb) {
      return cb.closest('.syllabus-section').querySelector('button').textContent.trim().split(':')[0].trim();
    }

    function getTopicLabel(cb) {
      return cb.closest('label').textContent.trim();
    }

    async function loadSyllabusProgress() {
      if (!window.clerkReady) return;
      try {
        const res = await apiRequest('GET', SYLLABUS_API);
        if (!res.success) return;
        const map = {};
        res.data.forEach(p => map[p.topicKey] = p.completed);
        document.querySelectorAll('.syllabus-check').forEach(cb => {
          const key = getTopicKey(cb);
          if (key in map) cb.checked = map[key];
        });
      } catch (e) { /* ignore */ }
    }

    document.querySelectorAll('.syllabus-check').forEach(cb => {
      cb.addEventListener('change', async () => {
        try {
          await apiRequest('PUT', SYLLABUS_API + '/' + encodeURIComponent(getTopicKey(cb)), {
            section: getSectionName(cb),
            topicLabel: getTopicLabel(cb),
            completed: cb.checked
          });
        } catch (e) { /* ignore */ }
      });
    });

    window.addEventListener('clerk-ready', loadSyllabusProgress);
    if (window.clerkReady) loadSyllabusProgress();
  </script>

        Save Entry

<script>
  const API_ENDPOINT = '/api/trackers/gate';

  function openModal() {
    document.getElementById('entry-form').reset();
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }


  async function loadData() {
    if (!window.clerkReady) return;
    try {
      const res = await apiRequest('GET', API_ENDPOINT);
      const tbody = document.getElementById('entries-table');
      if (!res.success || !res.data.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">No entries logged yet.</td></tr>';
        return;
      }
      tbody.innerHTML = res.data.map(d => {
        const accuracy = d.questionsAttempted > 0 ? Math.round((d.correct / d.questionsAttempted) * 100) + '%' : '-';
        return `
        <tr>
          <td class="px-6 py-4 font-medium text-gray-900">${d.subject}</td>
          <td class="px-6 py-4">${d.topic}</td>
          <td class="px-6 py-4">${d.questionsAttempted}</td>
          <td class="px-6 py-4 font-bold text-primary">${d.correct} (${accuracy})</td>
          <td class="px-6 py-4">${d.mockScore !== null ? d.mockScore : '-'}</td>
          <td class="px-6 py-4 text-gray-500">${new Date(d.date).toLocaleDateString()}</td>
          <td class="px-6 py-4 text-right">
            <button onclick="deleteEntry('${d.id}')" class="text-red-500 hover:text-red-700 font-medium text-sm">Delete</button>
          </td>
        </tr>
      `}).join('');
    } catch (e) {
      document.getElementById('entries-table').innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center text-red-500">Failed to load data.</td></tr>';
    }
  }

  document.getElementById('entry-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      subject: document.getElementById('in-subject').value,
      topic: document.getElementById('in-topic').value,
      questionsAttempted: parseInt(document.getElementById('in-attempted').value) || 0,
      correct: parseInt(document.getElementById('in-correct').value) || 0,
      mockScore: parseFloat(document.getElementById('in-score').value) || null
    };
    try {
      await apiRequest('POST', API_ENDPOINT, data);
      closeModal();
      loadData();
    } catch (err) {
      alert('Failed to save entry');
    }
  });

  async function deleteEntry(id) {
    if(!confirm('Delete this entry?')) return;
    try {
      await apiRequest('DELETE', `${API_ENDPOINT}/${id}`);
      loadData();
    } catch(e) {
      alert('Failed to delete');
    }
  }

  window.addEventListener('clerk-ready', loadData);
  if (window.clerkReady) loadData();
    
</script>
