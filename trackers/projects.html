<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Projects Tracker | ProgressOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600;700;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = { theme: { extend: { colors: { primary: "#FF9933", "on-surface": "#1E293B", "on-surface-variant": "#64748B", secondary: "#000080", tertiary: "#128807", error: "#EF4444" }, spacing: { "max_width": "1440px", "gutter": "24px" } } } }
</script>
<style>
body { background-color: #F9FAFB; color: #1E293B; font-family: 'Inter', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
.glass-card { background: #FFFFFF; border: 1px solid #E5E7EB; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.04); transition: all 0.3s ease; }
.status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
.status-IN_PROGRESS { background: #E0E7FF; color: #3730A3; }
.status-COMPLETED { background: #DCFCE7; color: #166534; }
.status-DEPLOYED { background: #FEF3C7; color: #92400E; }
.status-IDEA { background: #F3F4F6; color: #4B5563; }
</style>
  <script src="../js/auth.js"></script>
</head>
<body class="bg-background selection:bg-primary/20 selection:text-primary">

<header id="topnav" class="fixed top-0 left-0 w-full z-50 bg-white/85 backdrop-blur-xl border-b border-outline-variant shadow-sm">
  <div class="flex justify-between items-center px-gutter h-16 max-w-max_width mx-auto">
    <div class="flex justify-between w-full"><div class="flex items-center gap-8">
      <a href="../index.html" class="text-xl font-bold text-primary tracking-tight font-['Geist']">ProgressOS</a>
      <nav class="hidden lg:flex items-center gap-4">
        <a href="../index.html" class="text-on-surface-variant font-medium text-sm hover:text-primary">Dashboard</a>
        <a href="#" class="text-primary font-medium text-sm border-b-2 border-primary">Projects</a>
      </nav>
      <div id="auth-container"></div>
    </div>
  </div>
</header>

<main class="pt-24 pb-16 px-gutter max-w-max_width mx-auto">
  <div class="flex justify-between items-end mb-8">
    <div>
      <h1 class="text-3xl font-bold text-on-surface font-['Geist']">Projects Portfolio</h1>
      <p class="text-on-surface-variant mt-1">Manage your active, completed, and deployed projects.</p>
    </div>
    <button onclick="openModal()" class="bg-primary text-white px-4 py-2 rounded-lg font-medium hover:bg-[#e68a2e] active:scale-95 transition-all">
      <span class="material-symbols-outlined text-[18px] mr-1">add</span> New Project
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="projects-grid">
    <!-- Rendered by JS -->
  </div>
</main>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant">
      <h3 class="text-lg font-bold text-on-surface font-['Geist']">Add Project</h3>
      <button onclick="closeModal()" class="material-symbols-outlined text-on-surface-variant hover:text-on-surface">close</button>
    </div>
    <form id="entry-form" class="p-6 space-y-4">
      <div>
        <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Project Title</label>
        <input id="in-title" type="text" required class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
      </div>
      <div>
        <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Description</label>
        <textarea id="in-desc" rows="3" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Status</label>
          <select id="in-status" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg outline-none bg-white">
            <option value="IDEA">Idea</option>
            <option value="IN_PROGRESS" selected>In Progress</option>
            <option value="COMPLETED">Completed</option>
            <option value="DEPLOYED">Deployed</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Tech Stack</label>
          <input id="in-tech" type="text" placeholder="React, Node" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">GitHub URL</label>
          <input id="in-github" type="url" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
        </div>
        <div>
          <label class="text-xs text-on-surface-variant uppercase tracking-wider block mb-1.5">Live URL</label>
          <input id="in-live" type="url" class="w-full px-3 py-2 text-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 outline-none"/>
        </div>
      </div>
      <button type="submit" class="w-full bg-primary text-white py-2.5 rounded-lg font-medium hover:bg-[#e68a2e] transition-all">
        Save Project
      </button>
    </form>
  </div>
</div>

<script>
const API_URL = 'http://localhost:5000/api/trackers/projects';

function openModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('modal').classList.add('flex'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').classList.remove('flex'); }

async function fetchEntries() {
  try {
    const res = await window.apiFetch(API_URL);
    const data = await res.json();
    if (data.success) renderGrid(data.data);
  } catch (err) { console.error(err); }
}

function renderGrid(projects) {
  const container = document.getElementById('projects-grid');
  if (projects.length === 0) {
    container.innerHTML = '<p class="col-span-3 text-center text-on-surface-variant py-12">No projects added yet.</p>';
    return;
  }
  
  container.innerHTML = projects.map(p => {
    const techTags = p.techStack ? p.techStack.map(t => `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-[10px] uppercase font-bold mr-1 mb-1 inline-block">${t}</span>`).join('') : '';
    
    return `
      <div class="glass-card p-6 rounded-xl flex flex-col h-full relative group">
        <div class="flex justify-between items-start mb-4">
          <span class="status-badge status-${p.status}">${p.status.replace('_', ' ')}</span>
          <button onclick="deleteEntry('${p.id}')" class="material-symbols-outlined text-on-surface-variant hover:text-error text-[18px] opacity-0 group-hover:opacity-100 transition-opacity">delete</button>
        </div>
        <h3 class="text-lg font-bold text-on-surface font-['Geist'] mb-2">${p.title}</h3>
        <p class="text-sm text-on-surface-variant mb-4 flex-grow">${p.description || 'No description provided.'}</p>
        <div class="mb-4">${techTags}</div>
        <div class="flex gap-3 mt-auto pt-4 border-t border-outline-variant">
          ${p.githubUrl ? `<a href="${p.githubUrl}" target="_blank" class="text-xs font-bold text-on-surface-variant hover:text-primary flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">code</span> GitHub</a>` : ''}
          ${p.liveUrl ? `<a href="${p.liveUrl}" target="_blank" class="text-xs font-bold text-on-surface-variant hover:text-primary flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">open_in_new</span> Live App</a>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

document.getElementById('entry-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const techRaw = document.getElementById('in-tech').value;
  const data = {
    title: document.getElementById('in-title').value,
    description: document.getElementById('in-desc').value,
    status: document.getElementById('in-status').value,
    techStack: techRaw ? techRaw.split(',').map(t => t.trim()).filter(Boolean) : [],
    githubUrl: document.getElementById('in-github').value || null,
    liveUrl: document.getElementById('in-live').value || null,
  };
  
  try {
    const res = await window.apiFetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) { closeModal(); document.getElementById('entry-form').reset(); fetchEntries(); }
  } catch (err) {}
});

async function deleteEntry(id) {
  if (!confirm('Delete this project?')) return;
  try { await window.apiFetch(`${API_URL}/${id}`, { method: 'DELETE' }); fetchEntries(); } catch (err) {}
}

if (window.clerkReady) fetchEntries();
else window.addEventListener('clerk-ready', fetchEntries);
</script>
</body>
</html>
